# Cloudflare Worker configuration for Speakist.
#
# Two environments, both explicitly named so wrangler 4 never needs to guess:
#   * [env.dev]         → speakist-web-dev Worker + speakist-dev D1
#   * [env.production]  → speakist-web-prod Worker + speakist-prod D1
#
# Everything at the top level (compatibility_date, assets, observability) is
# shared by both envs. Each env adds its own Worker name + D1 binding.
#
# Commands always pass --env:
#   Local dev:     pnpm dev                 (next.config.ts passes environment: "dev")
#   Deploy dev:    pnpm deploy:dev          (--env dev)
#   Deploy prod:   pnpm deploy:prod         (--env production)
#   Set secrets:   pnpm exec wrangler secret put X --env dev | --env production
#   Migrate:       pnpm db:migrate:dev | :prod | :local
#
# After `wrangler d1 create speakist-{dev,prod}`, paste the returned
# `database_id` values into the right blocks below.

name = "speakist-web"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat"]
# Custom entrypoint that wraps the OpenNext-generated `.open-next/worker.js`
# so the real-time streaming route (`/api/transcribe/ws`) can do a WebSocket
# upgrade that Next.js route handlers can't. See web/worker.ts.
main = "worker.ts"

# Keep the .workers.dev URL enabled on dev as a fallback when the custom
# domain is misconfigured or down. Prod overrides to false so nobody hits
# speakist-web-prod.brevoortstudio.workers.dev instead of speakist.ai.
workers_dev = true

# Preview URLs generate per-version hostnames like
# <version>.speakist-web-dev.brevoortstudio.workers.dev. Useful for
# validating a build before promoting, but creates a sprawl of ephemeral
# URLs we don't need yet. Turn off globally; re-enable later if we adopt
# a preview workflow.
preview_urls = false

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# ─── dev ────────────────────────────────────────────────────────────────────

[env.dev]
name = "speakist-web-dev"

# Public, env-specific values that the Worker reads at runtime via
# process.env.X. Source of truth for everything that's not a secret
# and that differs between dev and prod. See docs/cicd.md for the
# full config-management strategy.
#
#   NEXT_PUBLIC_SITE_URL        — base URL Next.js uses for SSR-side
#                                 absolute-URL generation (metadataBase,
#                                 invitation links, magic-link callbacks
#                                 via env.server). Also set as a build-
#                                 time export in package.json so Next.js
#                                 webpack inlines it into the client
#                                 bundle for CSR references — this is
#                                 the one variable that legitimately
#                                 needs both tiers (build env + runtime
#                                 var) because it's read in both contexts.
#                                 NEVER as a Worker secret: it's public,
#                                 and env.server's strict z.string().url()
#                                 validation throws on the whole schema
#                                 if it's missing at runtime, taking
#                                 down every page that imports env.server.
#   RELEASE_DOWNLOAD_BASE_URL   — Mac DMG public origin (R2 custom domain)
#   RELEASE_R2_BUCKET           — bucket release.sh uploads DMGs to
#   IOS_TESTFLIGHT_URL          — public TestFlight invite, surfaced on
#                                 marketing pages + dashboard so the
#                                 Speakist-Dev web links to the dev
#                                 TestFlight and the prod web links to
#                                 the prod TestFlight automatically
#   RESEND_FROM_EMAIL           — magic-link "from" address. Same prod
#                                 domain on both envs because Resend is
#                                 only configured for speakist.ai.
#   SUPER_ADMIN_EMAIL           — bootstrap admin (seed script promotes)
#
# Secrets (API keys, AUTH_SECRET, APP_ENCRYPTION_KEY,
# RELEASE_PUBLISH_TOKEN, etc.) go via `wrangler secret put --env X`,
# never here. Build-time-only client-bundle values (other NEXT_PUBLIC_*
# without runtime-side reads) belong solely in package.json's deploy
# scripts.
[env.dev.vars]
NEXT_PUBLIC_SITE_URL = "https://speakist-dev.brevoortstudio.com"
RELEASE_DOWNLOAD_BASE_URL = "https://downloads-dev.brevoortstudio.com"
RELEASE_R2_BUCKET = "speakist-releases-dev"
IOS_TESTFLIGHT_URL = "https://testflight.apple.com/join/5jqHKMnu"
RESEND_FROM_EMAIL = "noreply@speakist.ai"
SUPER_ADMIN_EMAIL = "mike@brevoort.com"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "speakist-dev"
database_id = "bb47a53f-9aa2-4a9e-b98a-68350cd90cb2"
migrations_dir = "drizzle/migrations"

# Workers Analytics Engine — one event per /api/transcribe request
# (success or failure) with provider, model, status, duration, cost, and
# latency blobs. Queryable via SQL from the Cloudflare dashboard.
#
# Requires **Workers Paid** ($5/mo) — the Free plan returns error 10089
# at deploy time. `logTranscriptionEvent` no-ops gracefully if the binding
# is missing, so leaving this commented is safe; the Worker runs fine
# with no per-request events being recorded.
#
# To enable:
#   1. Cloudflare dashboard → Workers Plans → upgrade to Paid if needed
#   2. https://dash.cloudflare.com/{ACCOUNT_ID}/workers/analytics-engine
#      → click "Enable Analytics Engine"
#   3. Uncomment the blocks below (dev + production)
#   4. `pnpm deploy:dev` / `pnpm deploy:prod`
#
# [[env.dev.analytics_engine_datasets]]
# binding = "TRANSCRIPTION_EVENTS"
# dataset = "speakist_transcription_dev"

# [[env.dev.kv_namespaces]]
# binding = "CACHE"
# id = "__FILL_ME_IN__"

# R2 bucket for "Report bad transcription" audio uploads. Created via
#   wrangler r2 bucket create speakist-feedback-audio-dev
# Indefinite retention (no lifecycle policy) — this corpus is the
# regression bench source. /api/feedback writes here when a user
# explicitly reports a transcription with audio sharing enabled.
[[env.dev.r2_buckets]]
binding = "FEEDBACK_AUDIO"
bucket_name = "speakist-feedback-audio-dev"

# [[env.dev.r2_buckets]]
# binding = "AUDIO"
# bucket_name = "speakist-audio-dev"

# [[env.dev.queues.producers]]
# queue = "speakist-tasks-dev"
# binding = "QUEUE"

# ─── production ─────────────────────────────────────────────────────────────

[env.production]
name = "speakist-web-prod"
# Production should only be reachable at speakist.ai, never via the
# workers.dev fallback. Override the top-level default here.
workers_dev = false

[env.production.vars]
NEXT_PUBLIC_SITE_URL = "https://speakist.ai"
RELEASE_DOWNLOAD_BASE_URL = "https://downloads.speakist.ai"
RELEASE_R2_BUCKET = "speakist-releases-prod"
IOS_TESTFLIGHT_URL = "https://testflight.apple.com/join/jsMN1vWs"
RESEND_FROM_EMAIL = "noreply@speakist.ai"
SUPER_ADMIN_EMAIL = "mike@brevoort.com"
# Polish-prompt mirror: the dev Worker's base URL. The companion
# secret DEV_MIRROR_TOKEN is set via `wrangler secret put
# DEV_MIRROR_TOKEN --env production` — see
# docs/polish-prompt-mirror.md. Both must be set for the
# /admin/polish-prompts "Mirror → dev" button to enable.
DEV_MIRROR_BACKEND_URL = "https://speakist-dev.brevoortstudio.com"

[[env.production.d1_databases]]
binding = "DB"
database_name = "speakist-prod"
database_id = "b75f0baf-7acc-4795-9d2a-00cc97efadcc"
migrations_dir = "drizzle/migrations"

# See dev block above for enablement steps.
# [[env.production.analytics_engine_datasets]]
# binding = "TRANSCRIPTION_EVENTS"
# dataset = "speakist_transcription_prod"

# [[env.production.kv_namespaces]]
# binding = "CACHE"
# id = "__FILL_ME_IN__"

# See dev block above for purpose.
[[env.production.r2_buckets]]
binding = "FEEDBACK_AUDIO"
bucket_name = "speakist-feedback-audio-prod"

# [[env.production.r2_buckets]]
# binding = "AUDIO"
# bucket_name = "speakist-audio-prod"

# [[env.production.queues.producers]]
# queue = "speakist-tasks-prod"
# binding = "QUEUE"
