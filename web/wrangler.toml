# Cloudflare Worker configuration for Speakist.
#
# Two environments, both explicitly named so wrangler 4 never needs to guess:
#   * [env.dev]         → speakist-web-dev Worker + speakist-dev D1
#   * [env.production]  → speakist-web-prod Worker + speakist-prod D1
#
# Everything at the top level (compatibility_date, assets, observability) is
# shared by both envs. Each env adds its own Worker name + D1 binding.
#
# Commands always pass --env:
#   Local dev:     pnpm dev                 (next.config.ts passes environment: "dev")
#   Deploy dev:    pnpm deploy:dev          (--env dev)
#   Deploy prod:   pnpm deploy:prod         (--env production)
#   Set secrets:   pnpm exec wrangler secret put X --env dev | --env production
#   Migrate:       pnpm db:migrate:dev | :prod | :local
#
# After `wrangler d1 create speakist-{dev,prod}`, paste the returned
# `database_id` values into the right blocks below.

name = "speakist-web"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

# Keep the .workers.dev URL enabled on dev as a fallback when the custom
# domain is misconfigured or down. Prod overrides to false so nobody hits
# speakist-web-prod.brevoortstudio.workers.dev instead of speakist.ai.
workers_dev = true

# Preview URLs generate per-version hostnames like
# <version>.speakist-web-dev.brevoortstudio.workers.dev. Useful for
# validating a build before promoting, but creates a sprawl of ephemeral
# URLs we don't need yet. Turn off globally; re-enable later if we adopt
# a preview workflow.
preview_urls = false

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# ─── dev ────────────────────────────────────────────────────────────────────

[env.dev]
name = "speakist-web-dev"

# Public vars (non-secret). scripts/release.sh reads these via the web API
# to know where to upload DMGs and what URL to register in the releases
# table. Secrets (RELEASE_PUBLISH_TOKEN, etc.) go via `wrangler secret put`.
[env.dev.vars]
RELEASE_DOWNLOAD_BASE_URL = "https://downloads-dev.brevoortstudio.com"
RELEASE_R2_BUCKET = "speakist-releases-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "speakist-dev"
database_id = "bb47a53f-9aa2-4a9e-b98a-68350cd90cb2"
migrations_dir = "drizzle/migrations"

# Workers Analytics Engine — one event per /api/transcribe request
# (success or failure) with provider, model, status, duration, cost, and
# latency blobs. Queryable via SQL from the Cloudflare dashboard. Free
# tier covers ~10M events/month, well above our expected volume. Dataset
# is per-env so dev traffic doesn't pollute prod metrics.
[[env.dev.analytics_engine_datasets]]
binding = "TRANSCRIPTION_EVENTS"
dataset = "speakist_transcription_dev"

# [[env.dev.kv_namespaces]]
# binding = "CACHE"
# id = "__FILL_ME_IN__"

# [[env.dev.r2_buckets]]
# binding = "AUDIO"
# bucket_name = "speakist-audio-dev"

# [[env.dev.queues.producers]]
# queue = "speakist-tasks-dev"
# binding = "QUEUE"

# ─── production ─────────────────────────────────────────────────────────────

[env.production]
name = "speakist-web-prod"
# Production should only be reachable at speakist.ai, never via the
# workers.dev fallback. Override the top-level default here.
workers_dev = false

[env.production.vars]
RELEASE_DOWNLOAD_BASE_URL = "https://downloads.speakist.ai"
RELEASE_R2_BUCKET = "speakist-releases-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "speakist-prod"
database_id = "__FILL_ME_IN__"
migrations_dir = "drizzle/migrations"

[[env.production.analytics_engine_datasets]]
binding = "TRANSCRIPTION_EVENTS"
dataset = "speakist_transcription_prod"

