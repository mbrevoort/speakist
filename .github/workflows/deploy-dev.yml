# Dev environment CI/CD — runs on every push to main.
#
# Four jobs total:
#   * changes — diff the push to figure out which targets need rebuilding
#   * web — deploy Cloudflare Worker (Next.js + D1 migrations) to dev
#   * mac — build, sign, notarize, DMG, Sparkle-sign, R2 upload, publish
#   * ios — build Dev archive, upload to TestFlight (Internal group)
#
# `web`/`mac`/`ios` each `needs: changes` and gate via `if:` on the
# matching output. A docs-only commit, for example, runs `changes`
# (~10s on ubuntu) and then skips all three build jobs — no Mac runner
# minutes, no iOS, no Cloudflare deploy. `workflow_dispatch` runs
# everything regardless, so manual triggers are still a "kick all
# pipelines" button.
#
# No `needs:` between web/mac/ios so one job's failure doesn't block
# the others. Concurrency `cancel-in-progress: false` queues runs
# serially so a back-to-back push doesn't kill an in-flight
# notarization (which wastes 5+ minutes of Apple's notary queue and
# leaves zombie submission UUIDs).
#
# Security note: this workflow only consumes `secrets.*` (encrypted)
# and the GitHub-managed integer/hash variables `github.run_number`
# and `github.sha` (passed via env, not interpolated into shell). No
# untrusted user input (issue titles, PR descriptions, commit
# messages, head refs) reaches `run:` blocks — all values are either
# encrypted secrets or platform-controlled metadata.
#
# Production releases are NOT handled here — see deploy-prod.yml,
# which fires on `release: published` and ships to the prod Worker /
# R2 / TestFlight under the stable bundle IDs. docs/cicd.md covers
# the full secrets + Apple Developer portal one-time setup for both
# pipelines.

name: Deploy Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # changes → which build targets are affected by this push
  # ---------------------------------------------------------------------------
  # Filters are deliberately conservative — when in doubt, build. Path
  # rules to remember:
  #   * `Speakist/**` is mostly Mac-only, but a handful of files are
  #     cross-compiled into the iOS target (see project.yml's
  #     `SpeakistiOS:` source list). Those specific paths appear in
  #     both the `mac:` and `ios:` filters so editing one of them
  #     retriggers both targets. Keep this list in sync with
  #     project.yml — `awk '/SpeakistiOS:/,/info:/' project.yml |
  #     grep 'path: Speakist/'` regenerates the canonical list.
  #   * `Shared/**` is genuinely shared and triggers both Apple jobs.
  #   * `project.yml`, `.github/actions/setup-apple-signing/**`, and
  #     this workflow file all touch both Apple jobs.
  #   * `web/**` only ever affects the web job.
  changes:
    name: Detect changed targets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      mac: ${{ steps.filter.outputs.mac }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'web/**'
              - '.github/workflows/deploy-dev.yml'
            mac:
              - 'Speakist/**'
              - 'Shared/**'
              - 'project.yml'
              - 'scripts/release.sh'
              - 'scripts/release-ci.sh'
              - 'scripts/exportOptions.plist'
              - '.github/actions/setup-apple-signing/**'
              - '.github/workflows/deploy-dev.yml'
            ios:
              - 'SpeakistiOS/**'
              - 'SpeakistKeyboard/**'
              - 'Shared/**'
              # Cross-compiled into the iOS target via project.yml's
              # SpeakistiOS sources list. Keep in sync if you add or
              # remove entries there.
              - 'Speakist/App/AppIdentity.swift'
              - 'Speakist/Logging/Logger.swift'
              - 'Speakist/Resources/Brand.swift'
              - 'Speakist/Account/SpeakistAPIClient.swift'
              - 'Speakist/Account/SpeakistAccountManager.swift'
              - 'Speakist/Transcription/TranscriptionTypes.swift'
              - 'Speakist/Corrections/DiffEngine.swift'
              - 'Speakist/Settings/KeychainStore.swift'
              - 'project.yml'
              - 'scripts/release-ios-ci.sh'
              - 'scripts/exportOptions-ios.plist'
              - '.github/actions/setup-apple-signing/**'
              - '.github/workflows/deploy-dev.yml'

  # ---------------------------------------------------------------------------
  # Web → Cloudflare Worker (speakist-web-dev)
  # ---------------------------------------------------------------------------
  web:
    name: Deploy web to dev
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations (dev)
        # Migrations run BEFORE deploy. If migration fails, GitHub
        # Actions skips subsequent steps by default — so deploy is
        # safely gated behind a clean schema.
        working-directory: web
        run: pnpm db:migrate:dev

      - name: Deploy Worker (dev)
        working-directory: web
        run: pnpm deploy:dev

  # ---------------------------------------------------------------------------
  # Mac → Sparkle dev feed (downloads-dev.brevoortstudio.com)
  # ---------------------------------------------------------------------------
  mac:
    name: Build + ship Mac dev DMG
    needs: changes
    if: ${{ needs.changes.outputs.mac == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      # Web side: wrangler R2 upload + publish-API need these.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      RELEASE_PUBLISH_TOKEN: ${{ secrets.RELEASE_PUBLISH_TOKEN_DEV }}
      # Apple side: notarytool API auth + Sparkle key.
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        # release.sh shells out to `pnpm exec wrangler r2 …` from the
        # web/ directory, so we need the web target's deps installed.
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install xcodegen + jq
        run: brew install xcodegen jq

      - name: Install Sparkle tools
        # Pin to the same Sparkle version we depend on for the Mac
        # framework so sign_update output stays compatible. The
        # binary distribution is small (~1 MB) so no need to cache.
        run: |
          set -euo pipefail
          mkdir -p "$HOME/Library/Developer/Sparkle"
          curl -fsSL -o /tmp/sparkle.tar.xz \
            https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz
          tar -xf /tmp/sparkle.tar.xz -C "$HOME/Library/Developer/Sparkle"
          ls "$HOME/Library/Developer/Sparkle/bin/sign_update"

      - name: Set up Apple signing
        uses: ./.github/actions/setup-apple-signing
        with:
          p12-base64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          api-key-base64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}

      - name: Cache Swift packages
        # SPM resolution (KeyboardShortcuts, GRDB, Sparkle) takes 2-3
        # minutes per fresh build. Cache the resolved checkouts keyed
        # on Package.resolved which xcodegen writes alongside the
        # generated project. Cache miss only on dep upgrade.
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/Speakist-*/SourcePackages
          key: spm-mac-${{ hashFiles('Speakist.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-mac-

      - name: Build, notarize, sign, upload
        run: scripts/release-ci.sh

  # ---------------------------------------------------------------------------
  # iOS → TestFlight (Internal Testing group)
  # ---------------------------------------------------------------------------
  ios:
    name: Build + ship iOS Dev to TestFlight
    needs: changes
    if: ${{ needs.changes.outputs.ios == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Set up Apple signing
        # Imports a pre-baked Apple Distribution cert (P12) into the
        # runner keychain. Without this, every CI run had `xcodebuild
        # -allowProvisioningUpdates` mint a fresh cert via the App
        # Store Connect API, eventually hitting Apple's per-team
        # 3-cert cap and erroring out at archive time with
        # "Choose a certificate to revoke." With the P12 imported,
        # `-allowProvisioningUpdates` finds the existing cert in the
        # keychain and reuses it — provisioning profiles still get
        # auto-fetched/created, but no new certs ever land at the
        # portal.
        uses: ./.github/actions/setup-apple-signing
        with:
          p12-base64: ${{ secrets.APPLE_IOS_DISTRIBUTION_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_IOS_DISTRIBUTION_P12_PASSWORD }}
          api-key-base64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/Speakist-*/SourcePackages
          key: spm-ios-${{ hashFiles('Speakist.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-ios-

      - name: Build, sign, archive, upload to TestFlight
        run: scripts/release-ios-ci.sh
