<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFA98A"/>
      <stop offset="1" stop-color="#FF7547"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="18" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background, plum-tinted cream -->
  <rect x="48" y="48" width="928" height="928" rx="208" fill="#FFF1E6"/>
  <rect x="48" y="48" width="928" height="928" rx="208"
        fill="url(#bubble)" opacity="0.08"/>

  <!-- Speech bubble -->
  <g filter="url(#soft-shadow)">
    <path d="
      M 232 232
      h 560
      a 128 128 0 0 1 128 128
      v 336
      a 128 128 0 0 1 -128 128
      h -268
      l -120 112
      c -10 10 -28 2 -28 -12
      v -100
      h -144
      a 128 128 0 0 1 -128 -128
      v -336
      a 128 128 0 0 1 128 -128
      z"
      fill="url(#bubble)"/>
  </g>

  <!-- Waveform bars inside bubble -->
  <g transform="translate(0 -12)">
    <rect x="340" y="470" width="44" height="124" rx="22" fill="url(#wave)"/>
    <rect x="420" y="410" width="44" height="244" rx="22" fill="url(#wave)"/>
    <rect x="500" y="360" width="44" height="344" rx="22" fill="url(#wave)"/>
    <rect x="580" y="410" width="44" height="244" rx="22" fill="url(#wave)"/>
    <rect x="660" y="470" width="44" height="124" rx="22" fill="url(#wave)"/>
  </g>

  <!-- Plum dot mirroring the bubble tail for playful rhythm -->
  <circle cx="260" cy="820" r="24" fill="#4A2C5A" opacity="0.85"/>
  <circle cx="320" cy="852" r="14" fill="#4A2C5A" opacity="0.6"/>
</svg>
