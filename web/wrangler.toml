# Cloudflare Worker configuration for Speakist.
#
# OpenNext emits a single Worker at .open-next/worker.js that serves the
# entire Next.js app (SSR + API routes), with static assets under
# .open-next/assets/ served via the ASSETS binding.
#
# Dev vs prod are separate Workers (different `name`, different D1 dbs)
# managed via wrangler environments. `pnpm deploy:dev` uses the default
# block below; `pnpm deploy:prod` uses [env.production].
#
# After running `wrangler d1 create speakist-dev` and ...-prod, paste the
# returned `database_id` values into the right blocks below.

name = "speakist-web-dev"
main = ".open-next/worker.js"
compatibility_date = "2026-04-19"
# nodejs_compat activates the Workers Node.js v2 compat layer (auto at
# compatibility_date >= 2024-09-23). Required so Auth.js + Drizzle + Stripe
# SDK run unmodified.
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# -----------------------------------------------------------------------------
# Default (dev) bindings — used by `wrangler dev`, `opennextjs-cloudflare
# preview`, and `opennextjs-cloudflare deploy` (which becomes the
# `speakist-web-dev` Worker).
# -----------------------------------------------------------------------------

[[d1_databases]]
binding = "DB"
database_name = "speakist-dev"
database_id = "__FILL_ME_IN__"
migrations_dir = "drizzle/migrations"

# [[kv_namespaces]]
# binding = "CACHE"
# id = "__FILL_ME_IN__"

# [[r2_buckets]]
# binding = "AUDIO"
# bucket_name = "speakist-audio-dev"

# [[queues.producers]]
# queue = "speakist-tasks-dev"
# binding = "QUEUE"

# -----------------------------------------------------------------------------
# Production — invoked via `opennextjs-cloudflare deploy --env production`.
# A fully separate Worker name + D1 database. No shared state with dev.
# -----------------------------------------------------------------------------

[env.production]
name = "speakist-web-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "speakist-prod"
database_id = "__FILL_ME_IN__"
migrations_dir = "drizzle/migrations"

# [[env.production.kv_namespaces]]
# binding = "CACHE"
# id = "__FILL_ME_IN__"

# [[env.production.r2_buckets]]
# binding = "AUDIO"
# bucket_name = "speakist-audio-prod"

# [[env.production.queues.producers]]
# queue = "speakist-tasks-prod"
# binding = "QUEUE"
