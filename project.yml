name: Speakist
options:
  bundleIdPrefix: com.brevoort-studio
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "6"
    MARKETING_VERSION: "0.1.3"
    DEVELOPMENT_TEAM: Q5T8FJNX57

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.3"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.4"

targets:
  Speakist:
    type: application
    platform: macOS
    sources:
      - path: Speakist
    resources:
      - path: Speakist/Resources
    info:
      path: Speakist/Info.plist
      properties:
        # CFBundleName, CFBundleDisplayName, SpeakistChannel, and
        # CFBundleIdentifier all read per-configuration build settings
        # defined below. Xcode's Debug config produces the Local channel;
        # Release produces stable by default. scripts/release.sh rewrites
        # the Release block before xcodegen generate when shipping beta/dev.
        CFBundleName: $(SPEAKIST_DISPLAY_NAME)
        CFBundleDisplayName: $(SPEAKIST_DISPLAY_NAME)
        SpeakistChannel: $(SPEAKIST_CHANNEL)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "© 2026 Mike Brevoort. All rights reserved."
        NSMicrophoneUsageDescription: "Speakist listens when you hold your dictation shortcut and transcribes what you say."
        NSAppleEventsUsageDescription: "Speakist sends a paste keystroke to the frontmost app so it can insert transcribed text at your cursor."
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        # Per-channel URLs. SpeakistDefaultAPIBaseURL and SUFeedURL read
        # per-configuration build settings (see `configs:` below). For
        # Local that means localhost + no auto-update. release.sh rewrites
        # the Release block for dev/beta before xcodegen generate so the
        # baked-in Info.plist carries the right URLs for each channel.
        #
        # Channel matrix:
        #   stable → com.brevoort-studio.speakist       / "Speakist"       / speakist.ai/appcast.xml
        #   beta   → com.brevoort-studio.speakist.beta  / "Speakist Beta"  / speakist.ai/appcast-beta.xml
        #   dev    → com.brevoort-studio.speakist.dev   / "Speakist Dev"   / speakist-dev.../appcast-dev.xml
        #   local  → com.brevoort-studio.speakist.local / "Speakist Local" / localhost:3000 (no appcast)
        SUFeedURL: $(SPEAKIST_FEED_URL)
        SpeakistDefaultAPIBaseURL: $(SPEAKIST_API_BASE_URL)
        SUEnableAutomaticChecks: true
        SUPublicEDKey: "uBl1QE2lgZst3OSgHaY3kcSWMVgH4ergMacrne2wuvQ="
    entitlements:
      path: Speakist/Speakist.entitlements
    settings:
      base:
        # PRODUCT_NAME drives the .app bundle filename on disk and the
        # executable name inside it. Tracking SPEAKIST_DISPLAY_NAME means
        # Local builds produce `Speakist Local.app`, Dev releases produce
        # `Speakist Dev.app`, etc. — so users see the channel in /Applications
        # and in the Dock, not a generic "Speakist" for every channel.
        PRODUCT_NAME: $(SPEAKIST_DISPLAY_NAME)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        # Debug = the Xcode configuration a developer builds/runs locally
        # ("make build", or Cmd+R in Xcode). Emits the Local channel —
        # distinct bundle ID + display name so a developer's Local install
        # coexists with any signed channel (Dev/Beta/Stable) without
        # sharing TCC grants, Keychain items, UserDefaults, or Application
        # Support data. Points at localhost:3000 by default so `pnpm dev`
        # in web/ is the assumed backend.
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist.local
          SPEAKIST_DISPLAY_NAME: "Speakist Local"
          SPEAKIST_CHANNEL: local
          SPEAKIST_API_BASE_URL: "http://localhost:3000"
          SPEAKIST_FEED_URL: ""
        # Release: stable-channel defaults. release.sh rewrites these five
        # lines in-place before xcodegen generate when building beta/dev.
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist
          SPEAKIST_DISPLAY_NAME: "Speakist"
          SPEAKIST_CHANNEL: stable
          SPEAKIST_API_BASE_URL: "https://speakist.ai"
          SPEAKIST_FEED_URL: "https://speakist.ai/appcast.xml"
    dependencies:
      - package: KeyboardShortcuts
      - package: GRDB
        product: GRDB
      - package: Sparkle

  SpeakistTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SpeakistTests
    dependencies:
      - target: Speakist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        # Tests only ever run under the Debug configuration (see scheme
        # below), which produces the Local channel → PRODUCT_NAME is
        # "Speakist Local". Spaces in paths are fine here; Xcode quotes.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Speakist Local.app/Contents/MacOS/Speakist Local"

schemes:
  Speakist:
    build:
      targets:
        Speakist: all
        SpeakistTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SpeakistTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
