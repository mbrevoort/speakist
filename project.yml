name: Speakist
options:
  bundleIdPrefix: com.brevoort-studio
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "3"
    MARKETING_VERSION: "0.1.1"
    DEVELOPMENT_TEAM: Q5T8FJNX57

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.3"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.4"

targets:
  Speakist:
    type: application
    platform: macOS
    sources:
      - path: Speakist
    resources:
      - path: Speakist/Resources
    info:
      path: Speakist/Info.plist
      properties:
        # CFBundleName & CFBundleDisplayName read SPEAKIST_DISPLAY_NAME,
        # which is set per-configuration below (stable → "Speakist",
        # debug → "Speakist Debug"). scripts/release.sh also rewrites
        # the Release config's value for beta ("Speakist Beta") and dev
        # ("Speakist Dev") before xcodegen generate.
        CFBundleName: $(SPEAKIST_DISPLAY_NAME)
        CFBundleDisplayName: $(SPEAKIST_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "© 2026 Mike Brevoort. All rights reserved."
        NSMicrophoneUsageDescription: "Speakist listens when you hold your dictation shortcut and transcribes what you say."
        NSAppleEventsUsageDescription: "Speakist sends a paste keystroke to the frontmost app so it can insert transcribed text at your cursor."
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        # Per-channel values. scripts/release.sh rewrites these before
        # xcodegen generate so they end up in the built Info.plist with
        # the right channel's URLs. The defaults below are what you get
        # from an unflagged `make build` / `make archive` (= stable).
        #
        # Channel matrix:
        #   stable → com.brevoort-studio.speakist       / "Speakist"       / speakist.ai/appcast.xml
        #   beta   → com.brevoort-studio.speakist.beta  / "Speakist Beta"  / speakist.ai/appcast-beta.xml
        #   dev    → com.brevoort-studio.speakist.dev   / "Speakist Dev"   / speakist-dev.../appcast-dev.xml
        #   debug  → com.brevoort-studio.speakist.debug / "Speakist Debug" / (no appcast)
        SUFeedURL: "https://speakist.ai/appcast.xml"
        SpeakistDefaultAPIBaseURL: "https://speakist.ai"
        SpeakistChannel: "stable"
        SUEnableAutomaticChecks: true
        SUPublicEDKey: "uBl1QE2lgZst3OSgHaY3kcSWMVgH4ergMacrne2wuvQ="
    entitlements:
      path: Speakist/Speakist.entitlements
    settings:
      base:
        PRODUCT_NAME: Speakist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        # Debug: Xcode local builds. Distinct bundle ID + display name so a
        # developer's Debug install (run from Xcode) coexists with any
        # signed-channel installs without sharing TCC grants, Keychain,
        # UserDefaults, or Application Support data.
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist.debug
          SPEAKIST_DISPLAY_NAME: "Speakist Debug"
        # Release: stable-channel defaults. release.sh rewrites these two
        # lines in-place before xcodegen generate when building beta/dev.
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist
          SPEAKIST_DISPLAY_NAME: "Speakist"
    dependencies:
      - package: KeyboardShortcuts
      - package: GRDB
        product: GRDB
      - package: Sparkle

  SpeakistTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SpeakistTests
    dependencies:
      - target: Speakist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Speakist.app/Contents/MacOS/Speakist"

schemes:
  Speakist:
    build:
      targets:
        Speakist: all
        SpeakistTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SpeakistTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
