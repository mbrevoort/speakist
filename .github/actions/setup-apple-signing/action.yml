# Composite action that prepares a macOS runner for Apple-signed builds.
#
# Two pieces are set up:
#
#   1. **Temp keychain** with the Developer ID Application cert imported
#      (Mac side only — for codesigning the .app + DMG). The keychain is
#      added to the user's keychain search list and unlocked with a
#      one-shot password generated for this run. Skipped when
#      `p12-base64` is empty (iOS jobs don't need it because the
#      Distribution cert is auto-managed by `xcodebuild
#      -allowProvisioningUpdates` against the App Store Connect API).
#
#   2. **App Store Connect API key** decoded to
#      `~/.appstoreconnect/private_keys/AuthKey_<ID>.p8` — the
#      conventional location both `xcrun notarytool` and `xcodebuild
#      -authenticationKeyPath` look in by default. The action also
#      outputs the path explicitly for callers that want to pass it.
#
# Cleanup: GitHub-hosted runners are ephemeral, so the temp keychain
# vanishes with the runner at job end. Composite actions can't run
# post-steps, so we don't add explicit teardown — partial-run
# leftover state isn't a concern on hosted runners.
name: Set up Apple signing
description: Imports Developer ID cert + App Store Connect API key for codesign / notarytool / TestFlight upload

inputs:
  p12-base64:
    description: Developer ID Application cert P12, base64-encoded. Pass an empty string to skip P12 import (iOS App Store flow doesn't need it).
    required: true
  p12-password:
    description: P12 export password.
    required: false
    default: ""
  api-key-base64:
    description: App Store Connect API key (.p8 file contents), base64-encoded.
    required: true
  api-key-id:
    description: App Store Connect Key ID (10-character alphanumeric, e.g. "X9Y8Z7W6V5").
    required: true

outputs:
  api-key-path:
    description: Absolute path to the decoded .p8 file on the runner.
    value: ${{ steps.api-key.outputs.path }}

runs:
  using: composite
  steps:
    - name: Create temp keychain
      shell: bash
      run: |
        set -euo pipefail
        KC="$RUNNER_TEMP/build.keychain-db"
        KC_PW="$(uuidgen)"
        security create-keychain -p "$KC_PW" "$KC"
        # 2-hour timeout, longer than any realistic job duration.
        security set-keychain-settings -lut 7200 "$KC"
        security unlock-keychain -p "$KC_PW" "$KC"
        # Prepend our keychain to the search list so codesign finds the
        # newly-imported cert without losing access to the system keychain
        # (xcodebuild needs the system keychain for its own internal
        # certificates).
        EXISTING=$(security list-keychains -d user | tr -d '"' | xargs)
        security list-keychains -d user -s "$KC" $EXISTING
        echo "KEYCHAIN_PATH=$KC" >> "$GITHUB_ENV"
        echo "KEYCHAIN_PW=$KC_PW" >> "$GITHUB_ENV"

    - name: Import Developer ID P12
      if: inputs.p12-base64 != ''
      shell: bash
      env:
        P12_B64: ${{ inputs.p12-base64 }}
        P12_PW: ${{ inputs.p12-password }}
      run: |
        set -euo pipefail
        P12="$RUNNER_TEMP/dev-id.p12"
        echo "$P12_B64" | base64 --decode > "$P12"
        # `-T` flags whitelist tools that can use the imported key
        # without prompting — codesign + security + productsign covers
        # the entire Mac signing pipeline.
        security import "$P12" \
          -k "$KEYCHAIN_PATH" \
          -P "$P12_PW" \
          -T /usr/bin/codesign \
          -T /usr/bin/security \
          -T /usr/bin/productsign
        # Required on macOS 12+ to avoid "user interaction is not allowed"
        # prompts during codesign — sets the partition list (which apps
        # can access the key) to the standard Apple-tools set.
        security set-key-partition-list \
          -S apple-tool:,apple:,codesign: \
          -s -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH" >/dev/null
        rm "$P12"
        # Verify the cert is actually findable for codesign.
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"

    - name: Install App Store Connect API key
      id: api-key
      shell: bash
      env:
        KEY_B64: ${{ inputs.api-key-base64 }}
        KEY_ID: ${{ inputs.api-key-id }}
      run: |
        set -euo pipefail
        # Both `xcrun notarytool --key` and `xcodebuild
        # -authenticationKeyPath` look here by default if the key path
        # isn't explicitly passed — putting it here is a belt-and-
        # braces measure for any tool that searches the conventional
        # location.
        DIR="$HOME/.appstoreconnect/private_keys"
        mkdir -p "$DIR"
        KEY_PATH="$DIR/AuthKey_${KEY_ID}.p8"
        echo "$KEY_B64" | base64 --decode > "$KEY_PATH"
        chmod 600 "$KEY_PATH"
        echo "path=$KEY_PATH" >> "$GITHUB_OUTPUT"
