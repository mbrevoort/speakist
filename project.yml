name: Speakist
options:
  bundleIdPrefix: com.brevoort-studio
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.0"
  groupSortPosition: top

# Three Xcode configurations. Debug = local-channel work (developer's
# laptop); Dev = TestFlight + dev-Sparkle-feed builds shipped by CI;
# Release = stable App Store / Mac Store builds. Mac targets only
# differ in CFBundleVersion + signing between Dev and Release at build
# time — `scripts/release.sh` still channel-injects the Release block
# at runtime, so the Mac Dev: blocks below are placeholders that exist
# purely to satisfy xcodegen's "every target needs every config"
# requirement. iOS Dev is a real first-class channel with its own
# bundle ID, App Group, and TestFlight record.
configs:
  Debug: debug
  Dev: release
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "13"
    MARKETING_VERSION: "0.1.10"
    DEVELOPMENT_TEAM: Q5T8FJNX57

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.3"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.4"
  # PostHog product analytics + LLM observability + session replay (iOS).
  # Only initialized at runtime on the stable channel — see
  # Shared/Analytics.swift. Both Mac and iOS targets pull this in via
  # `dependencies:` below; the SPM package vends a single `PostHog`
  # product that resolves the platform-correct binary on each target.
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"

targets:
  Speakist:
    type: application
    platform: macOS
    sources:
      - path: Speakist
      # Single Shared/ file portable to macOS. The rest of Shared/ (App
      # Group bridge, Darwin notifier, URL scheme bridge,
      # SpeakistChannel enum) is iOS+keyboard plumbing the Mac target
      # has its own equivalents for. Analytics is the exception —
      # one wrapper, two platforms.
      - path: Shared/Analytics.swift
    resources:
      - path: Speakist/Resources
    info:
      path: Speakist/Info.plist
      properties:
        # CFBundleName, CFBundleDisplayName, SpeakistChannel, and
        # CFBundleIdentifier all read per-configuration build settings
        # defined below. Xcode's Debug config produces the Local channel;
        # Release produces stable by default. scripts/release.sh rewrites
        # the Release block before xcodegen generate when shipping beta/dev.
        CFBundleName: $(SPEAKIST_DISPLAY_NAME)
        CFBundleDisplayName: $(SPEAKIST_DISPLAY_NAME)
        SpeakistChannel: $(SPEAKIST_CHANNEL)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        # Speakist is a regular Dock + Cmd+Tab app. The status bar
        # icon is still installed at launch for at-a-glance recording
        # state, but `LSUIElement: false` ensures users who don't
        # find the menu bar icon can still reach the app via the
        # Dock, Cmd+Tab, and the standard top menu bar.
        LSUIElement: false
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "© 2026 Mike Brevoort. All rights reserved."
        NSMicrophoneUsageDescription: "Speakist listens when you hold your dictation shortcut and transcribes what you say."
        NSAppleEventsUsageDescription: "Speakist sends a paste keystroke to the frontmost app so it can insert transcribed text at your cursor."
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        # Per-channel URLs. SpeakistDefaultAPIBaseURL and SUFeedURL read
        # per-configuration build settings (see `configs:` below). For
        # Local that means localhost + no auto-update. release.sh rewrites
        # the Release block for dev/beta before xcodegen generate so the
        # baked-in Info.plist carries the right URLs for each channel.
        #
        # Channel matrix:
        #   stable → com.brevoort-studio.speakist       / "Speakist"       / speakist.ai/appcast.xml
        #   beta   → com.brevoort-studio.speakist.beta  / "Speakist Beta"  / speakist.ai/appcast-beta.xml
        #   dev    → com.brevoort-studio.speakist.dev   / "Speakist Dev"   / speakist-dev.../appcast-dev.xml
        #   local  → com.brevoort-studio.speakist.local / "Speakist Local" / localhost:3000 (no appcast)
        SUFeedURL: $(SPEAKIST_FEED_URL)
        SpeakistDefaultAPIBaseURL: $(SPEAKIST_API_BASE_URL)
        # Public PostHog project key (`phc_...`) — only baked into the
        # stable-channel Release config below. Empty string elsewhere
        # so Analytics.swift refuses to initialize. Safe to ship in
        # the Info.plist; PostHog client keys are designed to be
        # embedded in shipping client binaries.
        SpeakistPostHogKey: $(SPEAKIST_POSTHOG_KEY)
        SUEnableAutomaticChecks: true
        SUPublicEDKey: "uBl1QE2lgZst3OSgHaY3kcSWMVgH4ergMacrne2wuvQ="
    entitlements:
      # xcodegen rewrites this file on every `xcodegen generate` from the
      # `properties:` block below — don't hand-edit the .entitlements file,
      # your changes will be clobbered. Add new entitlements here.
      path: Speakist/Speakist.entitlements
      properties:
        # Required under hardened runtime (ENABLE_HARDENED_RUNTIME: YES).
        # Without this, AVCaptureDevice.requestAccess(for: .audio) silently
        # returns false without showing the TCC prompt — users never see
        # "<AppName> wants to use the microphone" and can't grant access.
        com.apple.security.device.audio-input: true
    settings:
      base:
        # PRODUCT_NAME drives the .app bundle filename on disk and the
        # executable name inside it. Tracking SPEAKIST_DISPLAY_NAME means
        # Local builds produce `Speakist Local.app`, Dev releases produce
        # `Speakist Dev.app`, etc. — so users see the channel in /Applications
        # and in the Dock, not a generic "Speakist" for every channel.
        PRODUCT_NAME: $(SPEAKIST_DISPLAY_NAME)
        # PRODUCT_MODULE_NAME pinned to "Speakist" so the Swift module
        # identifier stays channel-agnostic — otherwise Local builds get
        # a module called `Speakist_Local` (PRODUCT_NAME with spaces
        # replaced by underscores) and `@testable import Speakist` in
        # SpeakistTests fails to resolve. PRODUCT_MODULE_NAME only
        # affects the Swift module name, not the bundle / app name /
        # entitlements isolation, so per-channel sandboxing is unchanged.
        PRODUCT_MODULE_NAME: Speakist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        # Debug = the Xcode configuration a developer builds/runs locally
        # ("make build", or Cmd+R in Xcode). Emits the Local channel —
        # distinct bundle ID + display name so a developer's Local install
        # coexists with any signed channel (Dev/Beta/Stable) without
        # sharing TCC grants, Keychain items, UserDefaults, or Application
        # Support data. Points at localhost:3000 by default so `pnpm dev`
        # in web/ is the assumed backend.
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist.local
          SPEAKIST_DISPLAY_NAME: "Speakist Local"
          SPEAKIST_CHANNEL: local
          SPEAKIST_API_BASE_URL: "http://localhost:3000"
          SPEAKIST_FEED_URL: ""
          # Empty key on Local — Analytics.swift no-ops. We deliberately
          # keep dev/local builds out of the production PostHog project.
          SPEAKIST_POSTHOG_KEY: ""
        # Release: stable-channel defaults. release.sh rewrites these five
        # lines in-place before xcodegen generate when building beta/dev.
        # CODE_SIGN_STYLE override: only the main Speakist target uses
        # Manual + Developer ID Application — base setting (Automatic)
        # would require an Apple-ID-logged-in Xcode session to fetch a
        # development cert, which doesn't exist on a CI runner. Scoping
        # the override here (vs. on the xcodebuild command line) leaves
        # SPM dependency targets like KeyboardShortcuts and GRDB on
        # their default automatic signing — otherwise their resource
        # bundles error out demanding a DEVELOPMENT_TEAM they don't
        # have. Identity is prefix-matched so the local keychain's
        # full "Developer ID Application: Mike Brevoort (Q5T8FJNX57)"
        # entry and CI's imported cert both resolve.
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist
          SPEAKIST_DISPLAY_NAME: "Speakist"
          SPEAKIST_CHANNEL: stable
          SPEAKIST_API_BASE_URL: "https://speakist.ai"
          SPEAKIST_FEED_URL: "https://speakist.ai/appcast.xml"
          # PostHog project key. Default to empty so dev / local /
          # uncoordinated `make build` runs never send events. CI
          # overrides at xcodebuild time via
          #   xcodebuild SPEAKIST_POSTHOG_KEY=$SPEAKIST_POSTHOG_KEY_STABLE …
          # which propagates through the `SpeakistPostHogKey` Info.plist
          # substitution above. Analytics.swift refuses to init when
          # the value is empty, so no key → no PostHog regardless.
          SPEAKIST_POSTHOG_KEY: ""
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
        # Dev: placeholder, never built directly. release.sh always
        # operates on Release, regardless of which channel it's
        # producing — this block exists only so xcodegen doesn't
        # complain about the Mac target missing the Dev configuration
        # declared at the project root. If you ever build Dev locally
        # for the Mac (you shouldn't — use `make release CHANNEL=dev`)
        # you'd get a Release-shaped binary with the same defaults.
        Dev:
          PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist
          SPEAKIST_DISPLAY_NAME: "Speakist"
          SPEAKIST_CHANNEL: stable
          SPEAKIST_API_BASE_URL: "https://speakist.ai"
          SPEAKIST_FEED_URL: "https://speakist.ai/appcast.xml"
          SPEAKIST_POSTHOG_KEY: ""
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
    dependencies:
      - package: KeyboardShortcuts
      - package: GRDB
        product: GRDB
      - package: Sparkle
      - package: PostHog
        product: PostHog

  SpeakistTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SpeakistTests
    dependencies:
      - target: Speakist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        # Tests only ever run under the Debug configuration (see scheme
        # below), which produces the Local channel → PRODUCT_NAME is
        # "Speakist Local". Spaces in paths are fine here; Xcode quotes.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Speakist Local.app/Contents/MacOS/Speakist Local"

  # --------------------------------------------------------------------
  # iOS app + keyboard extension
  #
  # Architecture recap (see docs/ios-architecture.md): the containing app
  # holds the microphone session because iOS forbids app extensions from
  # AVAudioSession recording. The keyboard extension ships inside the
  # app's .app bundle (`PlugIns/SpeakistKeyboard.appex`) and talks back
  # to the app via the App Group + Darwin notifications + URL scheme.
  # --------------------------------------------------------------------

  SpeakistiOS:
    type: application
    platform: iOS
    preBuildScripts:
      # Stamp the binary with a build timestamp every time xcodebuild
      # runs. Surfaces in the Home view's Status section so you can
      # eyeball whether the code on your phone is the code you just
      # built — invaluable when iOS occasionally caches a stale .app
      # across device re-installs. Writes into Info.plist via a custom
      # key the Swift side reads on launch.
      - name: Stamp build timestamp
        script: |
          STAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          /usr/libexec/PlistBuddy -c "Set :SpeakistBuildTimestamp $STAMP" \
            "$SRCROOT/SpeakistiOS/Info.plist" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :SpeakistBuildTimestamp string $STAMP" \
                 "$SRCROOT/SpeakistiOS/Info.plist"
        basedOnDependencyAnalysis: false
    sources:
      - path: SpeakistiOS
      - path: Shared
      # Cross-compiled portable files from the Mac target. Adding them
      # as explicit file paths here (not the whole Speakist/ directory)
      # keeps the iOS target small and the Mac target untouched — both
      # compile the same source, but neither knows the other exists.
      - path: Speakist/App/AppIdentity.swift
      - path: Speakist/Logging/Logger.swift
      - path: Speakist/Resources/Brand.swift
      - path: Speakist/Account/SpeakistAPIClient.swift
      - path: Speakist/Account/SpeakistAccountManager.swift
      - path: Speakist/Transcription/TranscriptionTypes.swift
      - path: Speakist/Corrections/DiffEngine.swift
      - path: Speakist/Settings/KeychainStore.swift
    info:
      path: SpeakistiOS/Info.plist
      properties:
        # User-facing label on the iOS home screen + Spotlight. Reads
        # SPEAKIST_DISPLAY_NAME from the per-config build settings so
        # Local / Dev / Release each get their own visual identity
        # ("Speakist Local" / "Speakist Dev" / "Speakist") and don't
        # collide when the user has multiple channels installed.
        CFBundleName: $(SPEAKIST_DISPLAY_NAME)
        CFBundleDisplayName: $(SPEAKIST_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        # Required for App Store / TestFlight submission since iOS 11.
        # Points at the AppIcon asset under Resources/Assets.xcassets;
        # actool generates the device-specific icon variants from the
        # single 1024×1024 marketing icon at build time.
        CFBundleIconName: AppIcon
        # Pre-answer Apple's export-compliance prompt so every TestFlight
        # build auto-distributes instead of blocking on a manual click.
        # `false` = the app does not use non-exempt encryption. Speakist
        # only uses HTTPS via URLSession (system-provided TLS), which is
        # exempt under the standard cryptography category. If we ever
        # add custom crypto (e.g., E2EE messaging), this becomes `true`
        # and Apple will require an annual self-classification report.
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        MinimumOSVersion: $(IPHONEOS_DEPLOYMENT_TARGET)
        SpeakistChannel: $(SPEAKIST_CHANNEL)
        SpeakistDefaultAPIBaseURL: $(SPEAKIST_API_BASE_URL)
        # Public PostHog project key (`phc_...`) — only set on the
        # Release config so dev / local / TestFlight-dev builds never
        # send events. Empty value → Analytics.swift refuses to init.
        SpeakistPostHogKey: $(SPEAKIST_POSTHOG_KEY)
        # Placeholder overwritten by the preBuildScripts "Stamp build
        # timestamp" step on every build. Surfaced in the Home view
        # so "is my phone running the build I just pushed?" is one
        # glance instead of three rebuild-and-retry rounds.
        SpeakistBuildTimestamp: "0"
        NSHumanReadableCopyright: "© 2026 Mike Brevoort. All rights reserved."
        # Mic permission — containing app holds the session. Extension
        # never asks. Wording is required to disclose that audio leaves
        # the device for transcription (App Review 5.1.1): vague strings
        # that omit the network-transmission step routinely earn a
        # metadata rejection. We also note the data lifecycle so users
        # can grant the permission with the actual privacy contract in
        # mind, not just an abstract "we want the mic".
        NSMicrophoneUsageDescription: "Speakist records your voice while a Speak Session is active and uploads the audio to our backend for transcription. Audio is processed and discarded — only your finished transcript is saved on this device."
        # NOTE: NSLocalNetworkUsageDescription is intentionally omitted.
        # Earlier builds shipped one to support a developer reaching a
        # Tailscale-routed dev backend (CGNAT IPs trigger iOS Local
        # Network gating). All shipping channels (Local/Dev/Release)
        # now hit public DNS names (speakist.ai / speakist-dev.
        # brevoortstudio.com) which don't trip Local Network — the
        # entitlement was unused in production and looked unprofessional
        # in App Review. Devs hitting a tailnet host can re-add the key
        # to their local Info.plist (will be regenerated on
        # `xcodegen generate`) or override SPEAKIST_API_BASE_URL to a
        # public DNS proxy.
        # Background audio keeps the mic hot after the user swipes back
        # to the target app. Without this, iOS suspends recording when
        # the user switches away from Speakist and the session dies.
        UIBackgroundModes:
          - audio
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        # URL scheme so the keyboard can bring us foreground. All four
        # channel schemes registered; resolver in URLSchemeBridge picks
        # the one matching the current build.
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: $(PRODUCT_BUNDLE_IDENTIFIER)
            CFBundleURLSchemes:
              - speakist
              - speakistbeta
              - speakistdev
              - speakistlocal
        # Document the "I sometimes hand off to the Settings app" flow —
        # iOS doesn't really require this, but it's harmless.
        LSApplicationQueriesSchemes:
          - app-settings
    entitlements:
      # XcodeGen regenerates this file every run — edit via properties: below.
      path: SpeakistiOS/SpeakistiOS.entitlements
      properties:
        # App Group shared with the keyboard extension. The string is
        # a `$(VAR)` substitution that Xcode resolves at code-sign
        # time, so each Xcode configuration (Debug/Dev/Release) gets
        # its own group ID via the per-config SPEAKIST_APP_GROUP
        # setting below. Lets all three channels coexist on a single
        # device without sharing state.
        com.apple.security.application-groups:
          - $(SPEAKIST_APP_GROUP)
    settings:
      base:
        PRODUCT_NAME: Speakist
        # "1" = iPhone only. iPad support is a follow-up; the keyboard
        # extension UI needs different sizing.
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist.ios.local
          SPEAKIST_CHANNEL: local
          SPEAKIST_DISPLAY_NAME: "Speakist Local"
          SPEAKIST_APP_GROUP: group.com.brevoort-studio.speakist.local
          # Points at the deployed dev backend so device builds work
          # without any LAN / Tailscale plumbing. The Mac app's own
          # dev channel uses the same URL. For simulator work against
          # a local Next.js server, swap to `http://localhost:3000`
          # — the simulator shares the host's network stack.
          SPEAKIST_API_BASE_URL: "https://speakist-dev.brevoortstudio.com"
          # No PostHog on dev/local. See Analytics.swift.
          SPEAKIST_POSTHOG_KEY: ""
          # SDK-scoped signing: ad-hoc for simulator, real Apple
          # Developer signing for device. The simulator case needs
          # ad-hoc because there's no provisioning profile installed
          # and unsigned apps lose their entitlements (App Group,
          # etc.). Device builds MUST use the team-signed identity so
          # the entitlements are honored by the real iOS kernel.
          "CODE_SIGN_IDENTITY[sdk=iphonesimulator*]": "-"
          "AD_HOC_CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": YES
          "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": YES
        Dev:
          # First-class channel for TestFlight dev builds shipped by
          # CI. Each piece (bundle ID, App Group, channel tag, display
          # name) coordinates with the Apple Developer portal record:
          # `com.brevoort-studio.speakist.ios.dev` is registered with
          # the App Groups capability tied to
          # `group.com.brevoort-studio.speakist.dev`. Runtime channel
          # resolution in `Shared/SpeakistChannel.swift` keys off
          # SPEAKIST_CHANNEL=dev to pick the matching App Group +
          # URL scheme.
          PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist.ios.dev
          SPEAKIST_CHANNEL: dev
          SPEAKIST_DISPLAY_NAME: "Speakist Dev"
          SPEAKIST_APP_GROUP: group.com.brevoort-studio.speakist.dev
          SPEAKIST_API_BASE_URL: "https://speakist-dev.brevoortstudio.com"
          # No PostHog on Dev TestFlight builds. Only stable.
          SPEAKIST_POSTHOG_KEY: ""
          # Manual signing with the Apple Distribution identity. With
          # automatic signing, xcodebuild tried to ALSO mint a separate
          # iOS App Development cert during archive (for the underlying
          # build phase), eventually hitting Apple's per-cert-type cap.
          # Manual mode tells Xcode "use exactly this identity, don't
          # try to provision anything else."
          #
          # `PROVISIONING_PROFILE_SPECIFIER` names the App Store profile
          # that the Distribution cert signs into. The profile must
          # exist at developer.apple.com (Profiles → "+" → App Store →
          # bundle ID `…ios.dev` → Apple Distribution cert → Name:
          # `Speakist iOS Dev`). `release-ios-ci.sh`'s
          # `-allowProvisioningUpdates` + the App Store Connect API
          # key download it onto the runner at archive time; nothing
          # is auto-created so the cap stays untouched.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Speakist iOS Dev"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist.ios
          SPEAKIST_CHANNEL: stable
          SPEAKIST_DISPLAY_NAME: "Speakist"
          SPEAKIST_APP_GROUP: group.com.brevoort-studio.speakist
          SPEAKIST_API_BASE_URL: "https://speakist.ai"
          # PostHog key. Empty by default; CI overrides on the
          # xcodebuild command line for stable releases. See the Mac
          # Speakist target's Release block for the full rationale.
          SPEAKIST_POSTHOG_KEY: ""
          # Same manual-signing reasoning as Dev. Release config exists
          # for the future App Store production pipeline; it'll need
          # its own `Speakist iOS` (App Store) profile in the portal.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Speakist iOS"
    dependencies:
      - target: SpeakistKeyboard
      - package: PostHog
        product: PostHog

  SpeakistKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: SpeakistKeyboard
      - path: Shared
        # The keyboard extension doesn't link the PostHog SDK — analytics
        # belong in the containing app, which holds the user session and
        # network access. Exclude Analytics.swift so the extension build
        # doesn't pick it up via the shared `path: Shared` entry.
        excludes:
          - "Analytics.swift"
      - path: Speakist/App/AppIdentity.swift
      - path: Speakist/Logging/Logger.swift
      - path: Speakist/Resources/Brand.swift
    # Asset catalog with the BrandIcon image (downsampled from the
    # iOS app icon) used by KeyboardToolbarView. Keyboard extensions
    # need their own copy — they can't read the host app's bundle.
    resources:
      - path: SpeakistKeyboard/Resources
    info:
      path: SpeakistKeyboard/Info.plist
      properties:
        # Match the parent app's display name so the keyboard shows
        # under the right channel in iOS Settings → Keyboards. SPEAKIST_
        # DISPLAY_NAME lives in the per-config block alongside the
        # bundle ID and App Group.
        CFBundleDisplayName: $(SPEAKIST_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        MinimumOSVersion: $(IPHONEOS_DEPLOYMENT_TARGET)
        SpeakistChannel: $(SPEAKIST_CHANNEL)
        # NSExtension wiring for a custom keyboard. `RequestsOpenAccess`
        # is mandatory for:
        #   * network (the keyboard can read small state from defaults,
        #     but the main app does the actual network work)
        #   * shared App Group (no Full Access = no shared container)
        #   * extensionContext.open(url) to bring main app foreground
        # The user has to turn on Full Access in Settings → General →
        # Keyboard → Speakist. We surface a "how to" in the app.
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
        # iOS 14+ enforces LSApplicationQueriesSchemes for extensions
        # calling `extensionContext.open(url:)` — without the scheme
        # listed here, iOS silently returns `opened=false` and the
        # keyboard surfaces "Couldn't open Speakist" to the user. All
        # four channel schemes are listed so a single extension build
        # works regardless of the current channel.
        LSApplicationQueriesSchemes:
          - speakist
          - speakistbeta
          - speakistdev
          - speakistlocal
    entitlements:
      path: SpeakistKeyboard/SpeakistKeyboard.entitlements
      properties:
        # MUST match the parent app's App Group for IPC to work — the
        # SPEAKIST_APP_GROUP build setting is set identically on both
        # targets in each per-config block.
        com.apple.security.application-groups:
          - $(SPEAKIST_APP_GROUP)
    settings:
      base:
        PRODUCT_NAME: SpeakistKeyboard
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_HARDENED_RUNTIME: NO
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist.ios.local.Keyboard
          SPEAKIST_CHANNEL: local
          SPEAKIST_DISPLAY_NAME: "Speakist Local"
          SPEAKIST_APP_GROUP: group.com.brevoort-studio.speakist.local
          # Match the main-app target's SDK-scoped signing so the
          # embedded .appex is signed with the same identity on device.
          # Previous unscoped ad-hoc config left the keyboard unsigned
          # on device builds, which tripped the parent/child sign-
          # identity validation at link time.
          "CODE_SIGN_IDENTITY[sdk=iphonesimulator*]": "-"
          "AD_HOC_CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": YES
          "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": YES
        Dev:
          # Bundle ID + App Group MUST line up with the parent app's
          # Dev block above. Apple validates parent/child bundle ID
          # prefix at sign time — `…ios.dev.Keyboard` must extend
          # `…ios.dev`.
          PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist.ios.dev.Keyboard
          SPEAKIST_CHANNEL: dev
          SPEAKIST_DISPLAY_NAME: "Speakist Dev"
          SPEAKIST_APP_GROUP: group.com.brevoort-studio.speakist.dev
          # Mirror the parent app's manual-signing setup so embedded
          # code signing matches. The keyboard extension needs its own
          # App Store provisioning profile (`Speakist iOS Dev Keyboard`
          # in the portal) because Apple validates parent/child bundle
          # IDs against per-target profiles, not a shared one.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Speakist iOS Dev Keyboard"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.brevoort-studio.speakist.ios.Keyboard
          SPEAKIST_CHANNEL: stable
          SPEAKIST_DISPLAY_NAME: "Speakist"
          SPEAKIST_APP_GROUP: group.com.brevoort-studio.speakist
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Speakist iOS Keyboard"

schemes:
  Speakist:
    build:
      targets:
        Speakist: all
        SpeakistTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SpeakistTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  SpeakistiOS:
    build:
      targets:
        SpeakistiOS: all
        SpeakistKeyboard: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  # CI uses this scheme to archive + upload TestFlight builds. Local
  # developers can also pick it from Xcode's scheme dropdown to build
  # the dev channel against a real cert + provisioning profile (handy
  # for testing the dev-bundle App Group + URL scheme registration on
  # device without going through CI). The archive action is the only
  # one that meaningfully differs from the default scheme — `xcodebuild
  # -scheme "SpeakistiOS Dev" archive` is what `release-ios-ci.sh`
  # invokes.
  SpeakistiOS Dev:
    build:
      targets:
        SpeakistiOS: all
        SpeakistKeyboard: all
    run:
      config: Dev
    profile:
      config: Dev
    analyze:
      config: Dev
    archive:
      config: Dev
